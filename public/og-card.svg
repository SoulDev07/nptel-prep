<?xml version="1.0" encoding="UTF-8"?>
<svg 
  xmlns="http://www.w3.org/2000/svg" 
  width="1200" 
  height="420" 
  viewBox="0 0 1200 420" 
  role="img" 
  aria-labelledby="ogTitleLight"
>
  <title id="ogTitleLight">NPTEL Prep - Practice (light)</title>

  <defs>
    <!-- Logo gradient -->
    <linearGradient id="blueGreen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>

    <!-- Glow for logo -->
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#06b6d4" flood-opacity="0.35"/>
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#10b981" flood-opacity="0.25"/>
    </filter>

    <!-- Card subtle shadow -->
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.06"/>
    </filter>
  </defs>

  <!-- Outer background -->
  <rect width="100%" height="100%" fill="#f8fafc"/>

  <!-- Inner card -->
  <g transform="translate(60,50)" filter="url(#cardShadow)">
    <rect 
      width="1080" 
      height="320" 
      rx="24" 
      fill="#ffffff" 
      stroke="rgba(0,0,0,0.04)"
    />

    <g transform="translate(48,48)">
      <!-- EMBEDDED LOGO (scaled favicon, no white bg) -->
      <g transform="scale(1.05)">
        <!-- Abstract energy monogram -->
        <path
          d="M40 90V38c0-4 3-8 8-8h0c3 0 6 1.5 8 4l24 32V38h12v52c0 4-3 8-8 8h0c-3 0-6-1.5-8-4L52 62v28h-12z"
          fill="url(#blueGreen)"
          filter="url(#glow)"
          transform="translate(0,0) scale(1.2)"
        />
        <!-- Energy ring -->
        <circle 
          cx="64" cy="64" r="48" 
          fill="none" 
          stroke="url(#blueGreen)" 
          stroke-width="3" 
          opacity="0.25"
          transform="translate(0,0) scale(1.2)"
        />
        <!-- Central spark -->
        <circle 
          cx="64" cy="64" r="5" 
          fill="url(#blueGreen)" 
          opacity="0.9"
          transform="translate(0,0) scale(1.2)"
        />
      </g>

      <!-- Title and subtitle -->
      <g transform="translate(220,20)">
        <text 
          x="0" y="36" 
          font-family="Inter, system-ui" 
          font-weight="800" 
          font-size="42" 
          fill="#0f172a"
        >
          NPTEL Prep
        </text>
        <text 
          x="0" y="84" 
          font-family="Inter, system-ui" 
          font-weight="600" 
          font-size="26" 
          fill="#475569"
        >
          Practice MCQs · Instant feedback · Progress tracking
        </text>
      </g>

      <!-- Footer hint -->
      <text 
        x="0" y="210" 
        font-family="Inter, system-ui" 
        font-weight="500" 
        font-size="17" 
        fill="#94a3b8"
      >
        One question at a time - keyboard shortcuts: 1–5, ← →, R
      </text>
    </g>
  </g>
</svg>
