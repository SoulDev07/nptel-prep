<?xml version="1.0" encoding="UTF-8"?>
<svg 
  xmlns="http://www.w3.org/2000/svg" 
  width="1200" 
  height="420" 
  viewBox="0 0 1200 420" 
  role="img" 
  aria-labelledby="ogTitleDark"
>
  <title id="ogTitleDark">NPTEL Prep - Practice (dark)</title>

  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#081427"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>

    

    <!-- Glow for logo -->
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#0cb79f" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Outer background -->
  <rect width="100%" height="100%" fill="url(#bgGradient)"/>

  <!-- Inner card -->
  <g transform="translate(60,50)">
    <rect 
      width="1080" 
      height="320" 
      rx="24" 
      fill="rgba(255,255,255,0.02)" 
      stroke="rgba(255,255,255,0.06)"
    />

    <g transform="translate(48,48)">
      <!-- EMBEDDED LOGO (scaled favicon, no white bg) -->
      <g transform="scale(1.05)">
        <!-- Abstract energy monogram -->
        <path
          d="M40 90V38c0-4 3-8 8-8h0c3 0 6 1.5 8 4l24 32V38h12v52c0 4-3 8-8 8h0c-3 0-6-1.5-8-4L52 62v28h-12z"
          fill="#0cb79f"
          filter="url(#glow)"
          transform="translate(0,0) scale(1.2)"
        />
        <!-- Energy ring -->
        <circle 
          cx="64" cy="64" r="48" 
          fill="none" 
          stroke="#0cb79f" 
          stroke-width="3" 
          opacity="0.25"
          transform="translate(0,0) scale(1.2)"
        />
        <!-- Central spark -->
        <circle 
          cx="64" cy="64" r="5" 
          fill="#0cb79f" 
          opacity="0.9"
          transform="translate(0,0) scale(1.2)"
        />
      </g>

      <!-- Title and subtitle -->
      <g transform="translate(220,20)">
        <text 
          x="0" y="36" 
          font-family="Inter, system-ui" 
          font-weight="800" 
          font-size="42" 
          fill="#f1f5f9"
        >
          NPTEL Prep
        </text>
        <text 
          x="0" y="84" 
          font-family="Inter, system-ui" 
          font-weight="600" 
          font-size="26" 
          fill="#94a3b8"
        >
          Practice MCQs · Instant feedback · Progress tracking
        </text>
      </g>

      <!-- Footer hint -->
      <text 
        x="0" y="210" 
        font-family="Inter, system-ui" 
        font-weight="500" 
        font-size="17" 
        fill="#64748b"
      >
        One question at a time - keyboard shortcuts: 1–5, ← →, R
      </text>
    </g>
  </g>
</svg>
