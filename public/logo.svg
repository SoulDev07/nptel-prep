<?xml version="1.0" encoding="UTF-8"?>
<svg 
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 128 128"
  role="img"
  aria-labelledby="title"
>
  <title id="title">NPTEL Prep Favicon</title>

  <defs>
    

    <!-- Soft neon glow for energy -->
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#0cb79f" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- White background (for light mode) -->
  <rect width="128" height="128" rx="28" fill="#ffffff"/>

  <!-- Abstract energy monogram shape -->
  <path
    d="M40 90V38c0-4 3-8 8-8h0c3 0 6 1.5 8 4l24 32V38h12v52c0 4-3 8-8 8h0c-3 0-6-1.5-8-4L52 62v28h-12z"
    fill="#0cb79f"
    filter="url(#glow)"
  />

  <!-- Circular energy ring accent -->
  <circle 
    cx="64" cy="64" r="48" 
    fill="none" 
    stroke="#0cb79f" 
    stroke-width="3" 
    opacity="0.25"
  />

  <!-- Central spark dot -->
  <circle cx="64" cy="64" r="5" fill="#0cb79f" opacity="0.9"/>
</svg>
